services:
  concierge:
    image: ghcr.io/pburkhalter/waha-concierge:latest
    container_name: concierge
    restart: unless-stopped
    user: "568:568"
    ports:
      - "8286:8080"
    environment:
      # HTTP listener.
      LISTEN: ":8080"

      # WAHA — the WhatsApp HTTP API the bot reads from and writes to.
      WAHA_URL: "http://waha-nas:3000"
      WAHA_API_KEY: ""                          # optional
      WAHA_SESSION: "default"
      WAHA_CHAT_ID: "1203REPLACEME@g.us"        # group jid
      WAHA_BOT_PHONE: "+41 79 111 22 33"        # bot's own number

      # Upstream APIs.
      SEERR_URL: "http://192.168.0.203:5055"
      SEERR_API_KEY: "REPLACEME"
      SONARR_URL: "http://192.168.0.203:8989"
      SONARR_API_KEY: "REPLACEME"
      RADARR_URL: "http://192.168.0.203:7878"
      RADARR_API_KEY: "REPLACEME"
      JELLYFIN_URL: "http://192.168.0.203:8096"
      JELLYFIN_API_KEY: "REPLACEME"
      JELLYFIN_USER_ID: "REPLACEME"             # admin user id used for /Users/{id}/Items

      # External URLs included in welcome + library replies.
      JELLYFIN_EXTERNAL_URL: "https://jellyfin.home.pburkhalter.ch"
      SEERR_EXTERNAL_URL:    "https://seerr.home.pburkhalter.ch"

      # Scheduled jobs. Empty disables that job.
      CRON_WEEKLY_DIGEST: "0 9 * * 0"           # Sun 09:00
      CRON_WEEKLY_POLL:   "0 19 * * 5"          # Fri 19:00
      CRON_DAILY_HEALTH:  "0 8 * * *"           # daily 08:00

      # @mention map: jellyseerr username (lowercased) → WhatsApp phone (digits).
      PHONE_MAP_PATRIK: "417911122333"
      # PHONE_MAP_ADRIAN: "..."
      # PHONE_MAP_RUBEN:  "..."

      DB_PATH:    "/data/concierge.db"
      LOG_LEVEL:  "info"
      LOG_FORMAT: "json"
    volumes:
      - /mnt/Fast/apps/concierge/data:/data
